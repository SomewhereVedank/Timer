<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --accent: #e8ff47;
    --dim: #2a2a2a;
    --text: #ffffff;
    --muted: #999;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  /* Session selector */
  .session-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .session-picker {
    display: flex;
    gap: 8px;
    margin-bottom: 48px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
  }

  .session-btn {
    background: var(--surface);
    border: 1px solid var(--dim);
    color: #aaa;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .session-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .session-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0a;
    font-weight: 700;
  }

  /* Timer ring */
  .timer-ring-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 36px;
  }

  svg.ring {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: var(--dim); stroke-width: 2; }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: flat;
    transition: stroke-dashoffset 1s linear;
  }

  .timer-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time-display {
    font-family: 'Space Mono', monospace;
    font-size: 54px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -2px;
    line-height: 1;
  }

  .time-display.done {
    color: var(--accent);
  }

  .session-name {
    font-size: 11px;
    letter-spacing: 3px;
    color: #aaa;
    text-transform: uppercase;
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 40px;
  }

  .btn {
    background: none;
    border: 1px solid var(--dim);
    color: #aaa;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover { border-color: var(--text); color: var(--text); }

  .btn-primary {
    border-color: var(--accent);
    color: var(--accent);
    font-size: 12px;
    padding: 12px 36px;
  }

  .btn-primary:hover {
    background: var(--accent);
    color: #0a0a0a;
  }

  .btn-primary.running {
    background: var(--accent);
    color: #0a0a0a;
  }

  /* Progress bar */
  .progress-bar-wrap {
    width: 280px;
    height: 2px;
    background: var(--dim);
    position: relative;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear;
    box-shadow: 0 0 8px var(--accent);
  }

  /* Custom time */
  .custom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
  }

  .custom-input {
    background: var(--surface);
    border: 1px solid var(--dim);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    width: 60px;
    text-align: center;
    outline: none;
  }

  .custom-input:focus { border-color: var(--accent); }
  .custom-input::placeholder { color: var(--muted); }

  .custom-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #aaa;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Notification dot */
  .notif {
    position: fixed;
    top: 24px;
    right: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .notif.show { opacity: 1; }

  /* Alarm popup */
  .alarm-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%) scale(0.95);
    background: #111;
    border: 1px solid var(--accent);
    padding: 28px 36px;
    z-index: 100;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    min-width: 260px;
    box-shadow: 0 0 40px rgba(232,255,71,0.08);
  }
  .alarm-popup.show {
    opacity: 1;
    pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
  }
  .alarm-popup.warning { border-color: #ff9f0a; box-shadow: 0 0 40px rgba(255,159,10,0.08); }
  .alarm-popup.warning .alarm-tag { color: #ff9f0a; }
  .alarm-popup.warning .alarm-dismiss { border-color: #ff9f0a; color: #ff9f0a; }
  .alarm-popup.warning .alarm-dismiss:hover { background: #ff9f0a; color: #000; }

  .alarm-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .alarm-subject {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
  }
  .alarm-time {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #666;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .alarm-dismiss {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 24px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .alarm-dismiss:hover { background: var(--accent); color: #000; }

  .alarm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .alarm-overlay.show { opacity: 1; pointer-events: all; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .pulsing { animation: pulse 1s infinite; }

  /* Measuring tape schedule */
  .tape {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 108px;
    display: flex;
    flex-direction: column;
    z-index: 10;
    border-left: 1px solid #222;
    background: #0c0c0c;
  }

  .tape-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
    text-align: center;
    padding: 10px 4px 8px;
    border-bottom: 1px solid #1e1e1e;
  }

  .tape-inner {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .tape-track {
    position: absolute;
    left: 20px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #222;
  }

  .tape-block {
    position: absolute;
    left: 0;
    right: 0;
    transition: opacity 0.3s;
  }

  .tape-block.completed .tape-dot { background: #1e1e1e; border-color: #333; }
  .tape-block.completed .tape-text { opacity: 0.3; }

  .tape-block.active-block .tape-dot {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    border-color: var(--accent);
  }
  .tape-block.active-block .tape-subject { color: var(--accent) !important; }

  .tape-dot {
    position: absolute;
    left: 15px;
    top: 0;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 1px solid #444;
    transform: translateY(-5px);
    z-index: 2;
  }

  .tape-text {
    margin-left: 32px;
    padding-bottom: 2px;
  }

  .tape-time {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: #888;
    letter-spacing: 0.5px;
    display: block;
    margin-top: -2px;
  }

  .tape-subject {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #ddd;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: block;
  }

  .tape-dur {
    font-family: 'Space Mono', monospace;
    font-size: 7.5px;
    color: #666;
    display: block;
  }

  .tape-now-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--accent);
    opacity: 0.7;
    z-index: 5;
    pointer-events: none;
  }

  .tape-now-line::after {
    content: 'NOW';
    position: absolute;
    right: 4px;
    top: -7px;
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* small tick marks */
  .tape-tick {
    position: absolute;
    left: 18px;
    width: 6px;
    height: 1px;
    background: #222;
  }

  /* ---- Total Hours Panel (left) ---- */
  .totals-panel {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 108px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    border-right: 1px solid #222;
    background: #0c0c0c;
    padding-top: 10px;
    gap: 0;
  }

  .totals-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
    text-align: center;
    padding: 0 4px 8px;
    border-bottom: 1px solid #1e1e1e;
    width: 100%;
  }

  .totals-big {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-top: 24px;
    letter-spacing: -1px;
  }

  .totals-unit {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .totals-divider {
    width: 40px;
    height: 1px;
    background: #222;
    margin: 20px auto;
  }

  .totals-sessions {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -1px;
  }

  .totals-sessions-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: #666;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
    text-align: center;
  }

  .totals-log {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    margin-top: 16px;
    padding: 0 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .totals-log::-webkit-scrollbar { width: 2px; }
  .totals-log::-webkit-scrollbar-thumb { background: #333; }

  .log-entry {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: #555;
    letter-spacing: 0.5px;
    line-height: 1.4;
    border-left: 1px solid #2a2a2a;
    padding-left: 5px;
    animation: fadeIn 0.4s ease;
  }

  .log-entry .log-name {
    color: #888;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .log-entry .log-dur {
    color: var(--accent);
    opacity: 0.7;
  }

  .totals-reset {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: #444;
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px 0 14px;
    transition: color 0.2s;
  }
  .totals-reset:hover { color: #888; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Schedule toggle button */
  .tape-toggle {
    position: fixed;
    right: 108px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 40px;
    background: #111;
    border: 1px solid #222;
    border-right: none;
    color: #555;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: all 0.3s ease;
    font-size: 10px;
  }
  .tape-toggle:hover { color: var(--accent); border-color: #444; }
  .tape-toggle.hidden-state { right: 0; border-right: 1px solid #222; border-left: none; }

  /* Tape hidden state */
  .tape.tape-hidden { transform: translateX(108px); }
  .tape { transition: transform 0.3s ease; }

  /* Page tabs */
  .page-tabs {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0;
    z-index: 15;
  }
  .page-tab {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 18px;
    background: var(--surface);
    border: 1px solid #222;
    color: #555;
    cursor: pointer;
    transition: all 0.2s;
  }
  .page-tab + .page-tab { border-left: none; }
  .page-tab:hover { color: #aaa; border-color: #444; }
  .page-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(232,255,71,0.04); }

  /* Pages */
  .page { display: none; }
  .page.active { display: flex; }



  .pomo-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .pomo-config {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
    align-items: center;
  }
  .pomo-config-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .pomo-config-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #666;
    text-transform: uppercase;
  }
  .pomo-config-input {
    background: var(--surface);
    border: 1px solid var(--dim);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 0;
    width: 52px;
    text-align: center;
    outline: none;
  }
  .pomo-config-input:focus { border-color: var(--accent); }
  .pomo-sep { font-family: 'Space Mono', monospace; color: #333; font-size: 18px; margin-top: 14px; }

  .pomo-ring-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin-bottom: 28px;
  }
  .pomo-ring-wrap svg.ring { position: absolute; inset: 0; transform: rotate(-90deg); }

  .pomo-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .pomo-time {
    font-family: 'Space Mono', monospace;
    font-size: 50px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -2px;
    line-height: 1;
  }
  .pomo-time.work-phase { color: var(--text); }
  .pomo-time.break-phase { color: #4af; }
  .pomo-time.done { color: var(--accent); }

  .pomo-phase-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: #aaa;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .pomo-phase-label.break-phase { color: #4af; }

  .pomo-round {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #555;
    margin-top: 4px;
  }

  .pomo-controls {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 24px;
  }

  .pomo-dots {
    display: flex;
    gap: 8px;
  }
  .pomo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2a2a;
    border: 1px solid #333;
    transition: all 0.3s;
  }
  .pomo-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pomo-dot.break-filled { background: #4af; border-color: #4af; }

  /* ---- Floating Task Widget ---- */
  .float-tasks {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    z-index: 50;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    transition: opacity 0.25s, transform 0.25s;
  }
  .float-tasks.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(8px);
  }
  .float-tasks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid #1e1e1e;
  }
  .float-tasks-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: #888;
    text-transform: uppercase;
  }
  .float-tasks-count {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: #555;
    letter-spacing: 1px;
  }
  .float-tasks-close {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: #444;
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
    padding: 0 0 0 8px;
    transition: color 0.15s;
  }
  .float-tasks-close:hover { color: #aaa; }
  .float-tasks-input-row {
    display: flex;
    border-bottom: 1px solid #1a1a1a;
  }
  .float-tasks-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    outline: none;
    letter-spacing: 0.3px;
  }
  .float-tasks-input::placeholder { color: #333; }
  .float-tasks-add {
    background: none;
    border: none;
    border-left: 1px solid #1a1a1a;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    width: 36px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .float-tasks-add:hover { background: rgba(232,255,71,0.06); }
  .float-tasks-list {
    max-height: 220px;
    overflow-y: auto;
    padding: 4px 0;
  }
  .float-tasks-list::-webkit-scrollbar { width: 2px; }
  .float-tasks-list::-webkit-scrollbar-thumb { background: #222; }
  .float-task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .float-task-item:hover { background: #161616; }
  .float-task-item.done { opacity: 0.3; }
  .float-task-item.done .float-task-text { text-decoration: line-through; }
  .float-task-box {
    width: 12px;
    height: 12px;
    border: 1px solid #444;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .float-task-item.done .float-task-box { background: var(--accent); border-color: var(--accent); }
  .float-task-check {
    width: 6px;
    height: 4px;
    border-left: 1.5px solid #0a0a0a;
    border-bottom: 1.5px solid #0a0a0a;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
  }
  .float-task-item.done .float-task-check { opacity: 1; }
  .float-task-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #ccc;
    flex: 1;
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .float-task-del {
    font-size: 13px;

</style>
</head>
<body>

<div class="notif" id="notif">SESSION DONE</div>

<!-- Page tabs -->
<div class="page-tabs">
  <button class="page-tab active" id="tab-timer" onclick="switchPage('timer')">timer</button>
  <button class="page-tab" id="tab-pomodoro" onclick="switchPage('pomodoro')">pomodoro</button>
  <button class="page-tab" id="tab-stopwatch" onclick="switchPage('stopwatch')">stopwatch</button>
</div>

<!-- Schedule toggle arrow -->
<button class="tape-toggle" id="tapeToggle" onclick="toggleTape()" title="Toggle schedule">›</button>

<!-- ===== TIMER PAGE ===== -->
<div class="page active" id="page-timer">
<div class="container">

  <div class="session-label">select session</div>

  <div class="session-picker" id="sessionPicker">
    <button class="session-btn" data-mins="120">Quants — 2hr</button>
    <button class="session-btn" data-mins="60">VA — 1hr</button>
    <button class="session-btn" data-mins="120">Accounts — 2hr</button>
    <button class="session-btn" data-mins="90">Economics — 1.5hr</button>
    <button class="session-btn" data-mins="60">Business Studies — 1hr</button>
    <button class="session-btn" data-mins="90">LR — 1.5hr</button>
    <button class="session-btn" data-mins="45">VA Revision — 45m</button>
    <button class="session-btn" data-mins="15">Mistake Log — 15m</button>
  </div>

  <div class="timer-ring-wrap">
    <svg class="ring" viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="130"/>
      <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="130"/>
    </svg>
    <div class="timer-inner">
      <div class="time-display" id="timeDisplay">00:00</div>
      <div class="session-name" id="sessionName">no session</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="resetBtn" onclick="resetTimer()">reset</button>
    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">start</button>
    <button class="btn" id="skipBtn" onclick="skipTimer()">done</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="custom-row">
    <span class="custom-label">custom</span>
    <input class="custom-input" id="customMins" type="number" placeholder="min" min="1" max="300"/>
    <button class="btn" onclick="setCustom()">set</button>
  </div>

</div>
</div><!-- end page-timer -->

<!-- ===== POMODORO PAGE ===== -->
<div class="page pomo-page" id="page-pomodoro">

  <div class="pomo-label">pomodoro</div>

  <div class="pomo-config">
    <div class="pomo-config-item">
      <span class="pomo-config-label">work</span>
      <input class="pomo-config-input" id="pomoWorkMins" type="number" value="25" min="1" max="90" onchange="pomoReset()"/>
    </div>
    <div class="pomo-sep">/</div>
    <div class="pomo-config-item">
      <span class="pomo-config-label">break</span>
      <input class="pomo-config-input" id="pomoBreakMins" type="number" value="5" min="1" max="30" onchange="pomoReset()"/>
    </div>
    <div class="pomo-sep">/</div>
    <div class="pomo-config-item">
      <span class="pomo-config-label">rounds</span>
      <input class="pomo-config-input" id="pomoRounds" type="number" value="4" min="1" max="12" onchange="pomoReset()"/>
    </div>
  </div>

  <div class="pomo-ring-wrap">
    <svg class="ring" viewBox="0 0 260 260">
      <circle class="ring-bg" cx="130" cy="130" r="120"/>

    </svg>
    <div class="pomo-inner">
      <div class="pomo-time" id="pomoTimeDisplay">25:00</div>
      <div class="pomo-phase-label" id="pomoPhaseLabel">work</div>
      <div class="pomo-round" id="pomoRoundLabel">round 1 / 4</div>
    </div>
  </div>

  <div class="pomo-controls">
    <button class="btn" onclick="pomoReset()">reset</button>
    <button class="btn btn-primary" id="pomoStartBtn" onclick="pomoToggle()">start</button>
    <button class="btn" onclick="pomoSkip()">skip</button>

  <div class="pomo-dots" id="pomoDots"></div>

</div><!-- end page-pomodoro -->

<!-- ===== STOPWATCH PAGE ===== -->
<div class="page" id="page-stopwatch">
<div class="container">

  <div class="session-label">stopwatch</div>

  <div class="timer-ring-wrap">
    <svg class="ring" viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="130"/>
      <circle class="ring-progress" id="swRingProgress" cx="140" cy="140" r="130"/>
    </svg>
    <div class="timer-inner">
      <div class="time-display" id="swDisplay">00:00.0</div>
      <div class="session-name" id="swLapLabel">–</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="swLapBtn" onclick="swLap()" disabled>lap</button>
    <button class="btn btn-primary" id="swStartBtn" onclick="swToggle()">start</button>
    <button class="btn" id="swResetBtn" onclick="swReset()">reset</button>
  </div>

  <div id="swLapList" style="
    margin-top: 20px;
    width: 280px;
    max-height: 160px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  "></div>

</div>
</div><!-- end page-stopwatch -->


<script>
  let totalSeconds = 0;
  let remaining = 0;
  let rafId = null;
  let running = false;
  let currentSession = '';
  let startTime = null;
  let remainingAtStart = 0;
  const circumference = 2 * Math.PI * 130;

  // ---- Totals tracking ----
  let totalStudiedSeconds = 0;
  let completedSessions = 0;
  let sessionLog = [];

  function logSession(name, secsStudied) {
    if (secsStudied < 5) return; // ignore accidental presses
    totalStudiedSeconds += secsStudied;
    completedSessions++;
    const mins = Math.round(secsStudied / 60);
    sessionLog.unshift({ name, mins });
    updateTotalsPanel();
  }

  function updateTotalsPanel() {
    const hrs = (totalStudiedSeconds / 3600).toFixed(1);
    document.getElementById('totalHrsDisplay').textContent = hrs;
    document.getElementById('totalSessionsDisplay').textContent = completedSessions;

    const log = document.getElementById('totalsLog');
    log.innerHTML = '';
    sessionLog.slice(0, 20).forEach(entry => {
      const el = document.createElement('div');
      el.className = 'log-entry';
      el.innerHTML = `<span class="log-name">${entry.name}</span><span class="log-dur">+${entry.mins}m</span>`;
      log.appendChild(el);
    });
  }

  function resetTotals() {
    totalStudiedSeconds = 0;
    completedSessions = 0;
    sessionLog = [];
    updateTotalsPanel();
  }

  let alarmsMuted = false;
  function toggleMute() {
    alarmsMuted = !alarmsMuted;
    document.getElementById('muteBtn').textContent = alarmsMuted ? 'mute on' : 'mute off';
    document.getElementById('muteBtn').style.color = alarmsMuted ? '#e8ff47' : '#444';
  }

  const ring = document.getElementById('ringProgress');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference;

  function setSession(mins, name) {
    resetTimer();
    totalSeconds = mins * 60;
    remaining = totalSeconds;
    currentSession = name;
    document.getElementById('sessionName').textContent = name.toLowerCase();
    updateDisplay();
    setRing(1);
  }

  function toggleTimer() {
    if (!totalSeconds) return;
    if (running) {
      cancelAnimationFrame(rafId);
      running = false;
      remaining = getRemainingNow();
      document.getElementById('startBtn').textContent = 'resume';
      document.getElementById('startBtn').classList.remove('running');
    } else {
      running = true;
      startTime = Date.now();
      remainingAtStart = remaining;
      document.getElementById('startBtn').textContent = 'pause';
      document.getElementById('startBtn').classList.add('running');
      rafId = requestAnimationFrame(tick);
    }
  }

  function getRemainingNow() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    return Math.max(0, remainingAtStart - elapsed);
  }

  function tick() {
    const rem = getRemainingNow();
    remaining = rem;
    updateDisplay();
    setRing(remaining / totalSeconds);

    if (remaining <= 0) {
      running = false;
      const studiedSecs = totalSeconds; // full session completed
      document.getElementById('startBtn').textContent = 'start';
      document.getElementById('startBtn').classList.remove('running');
      document.getElementById('timeDisplay').classList.add('done', 'pulsing');
      logSession(currentSession, studiedSecs);
      showNotif();
      try {
        const ctx = new AudioContext();
        [880, 660, 440].forEach((f, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = f;
          g.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.25);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + 0.4);
          o.start(ctx.currentTime + i * 0.25);
          o.stop(ctx.currentTime + i * 0.25 + 0.5);
        });
      } catch(e) {}
      return;
    }
    rafId = requestAnimationFrame(tick);
  }

  function updateDisplay() {
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    document.getElementById('timeDisplay').textContent = `${m}:${s}`;
    document.getElementById('progressFill').style.width = ((1 - remaining/totalSeconds)*100) + '%';
  }

  function setRing(fraction) {
    ring.style.strokeDashoffset = circumference * (1 - fraction);
  }

  function resetTimer() {
    cancelAnimationFrame(rafId);
    running = false;
    remaining = totalSeconds;
    startTime = null;
    document.getElementById('startBtn').textContent = 'start';
    document.getElementById('startBtn').classList.remove('running');
    document.getElementById('timeDisplay').classList.remove('done', 'pulsing');
    document.getElementById('progressFill').style.width = '0%';
    setRing(1);
    if (totalSeconds) updateDisplay();
    else {
      document.getElementById('timeDisplay').textContent = '00:00';
      setRing(0);
    }
  }

  function skipTimer() {
    if (!totalSeconds) return;
    const secsStudied = running ? remainingAtStart - getRemainingNow() : (totalSeconds - remaining);
    cancelAnimationFrame(rafId);
    running = false;
    remaining = 0;
    updateDisplay();
    setRing(0);
    document.getElementById('startBtn').textContent = 'start';
    document.getElementById('startBtn').classList.remove('running');
    logSession(currentSession, secsStudied);
  }

  function setCustom() {
    const val = parseInt(document.getElementById('customMins').value);
    if (!val || val < 1) return;
    document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
    setSession(val, `custom ${val}m`);
  }

  function showNotif() {
    const n = document.getElementById('notif');
    n.classList.add('show');
    setTimeout(() => n.classList.remove('show'), 3000);
  }

  document.querySelectorAll('.session-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const mins = parseInt(this.dataset.mins);
      const name = this.textContent;
      setSession(mins, name);
    });
  });

  // ---- SCHEDULE TAPE ----
  const schedule = [
    { time: '11:30', subject: 'Quants', dur: '2hr', mins: 120 },
    { time: '13:30', subject: 'VA', dur: '1hr', mins: 60 },
    { time: '14:30', subject: 'Lunch', dur: '30m', mins: 30, break: true },
    { time: '15:00', subject: 'Quants', dur: '2hr', mins: 120 },
    { time: '17:00', subject: 'Accounts', dur: '2hr', mins: 120 },
    { time: '19:00', subject: 'Economics', dur: '30m', mins: 30 },
    { time: '19:30', subject: 'Walk', dur: '1.5hr', mins: 90, break: true },
    { time: '21:00', subject: 'Economics', dur: '1.5hr', mins: 90 },
    { time: '22:30', subject: 'Bus. Studies', dur: '1hr', mins: 60 },
    { time: '23:30', subject: 'Quants', dur: '2hr', mins: 120 },
    { time: '01:30', subject: 'LR', dur: '1.5hr', mins: 90 },
    { time: '03:00', subject: 'VA Revision', dur: '45m', mins: 45 },
    { time: '03:45', subject: 'Mistake Log', dur: '15m', mins: 15 },
  ];

  function timeToMins(t) {
    const [h, m] = t.split(':').map(Number);
    // treat times < 11 as next day (past midnight)
    return h < 11 ? (h + 24) * 60 + m : h * 60 + m;
  }

  function buildTape() {
    const inner = document.getElementById('tapeInner');
    const totalMins = 17 * 60; // 11:30 to 04:00 = 16.5hrs, use 17hr window
    const startMins = timeToMins('11:30');
    const endMins = startMins + totalMins;
    const h = inner.clientHeight || window.innerHeight - 40;

    // Add ticks every 30 mins
    for (let m = 0; m <= totalMins; m += 30) {
      const pct = m / totalMins;
      const tick = document.createElement('div');
      tick.className = 'tape-tick';
      tick.style.top = (pct * h) + 'px';
      inner.appendChild(tick);
    }

    schedule.forEach((s, i) => {
      const sMins = timeToMins(s.time);
      const pct = (sMins - startMins) / totalMins;
      const top = pct * h;

      const block = document.createElement('div');
      block.className = 'tape-block' + (s.break ? ' break-block' : '');
      block.id = 'tape-block-' + i;
      block.style.top = top + 'px';

      const dot = document.createElement('div');
      dot.className = 'tape-dot';

      const text = document.createElement('div');
      text.className = 'tape-text';

      const timeEl = document.createElement('span');
      timeEl.className = 'tape-time';
      timeEl.textContent = s.time;

      const subEl = document.createElement('span');
      subEl.className = 'tape-subject';
      subEl.textContent = s.subject;
      if (s.break) subEl.style.color = '#666';

      const durEl = document.createElement('span');
      durEl.className = 'tape-dur';
      durEl.textContent = s.dur;

      text.appendChild(timeEl);
      text.appendChild(subEl);
      text.appendChild(durEl);
      block.appendChild(dot);
      block.appendChild(text);
      inner.appendChild(block);
    });

    updateNowLine();
  }

  function updateNowLine() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    const nowMins = h < 11 ? (h + 24) * 60 + m : h * 60 + m;
    const startMins = timeToMins('11:30');
    const totalMins = 17 * 60;
    const inner = document.getElementById('tapeInner');
    const height = inner.clientHeight || window.innerHeight - 40;
    const pct = (nowMins - startMins) / totalMins;

    const line = document.getElementById('tapeNowLine');
    if (pct >= 0 && pct <= 1) {
      line.style.top = (pct * height) + 'px';
      line.style.display = 'block';
    } else {
      line.style.display = 'none';
    }

    // highlight current and past blocks
    schedule.forEach((s, i) => {
      const sMins = timeToMins(s.time);
      const eMins = sMins + s.mins;
      const el = document.getElementById('tape-block-' + i);
      if (!el) return;
      el.classList.remove('active-block', 'completed');
      if (nowMins >= sMins && nowMins < eMins) {
        el.classList.add('active-block');
      } else if (nowMins >= eMins) {
        el.classList.add('completed');
      }
    });
  }

  window.addEventListener('load', () => {
    setTimeout(buildTape, 100);
    setInterval(updateNowLine, 30000);
  });

  // ---- ALARM SYSTEM ----
  const alarmFired = {}; // tracks which alarms already fired today

  function playAlarmSound(type) {
    if (alarmsMuted) return;
    try {
      const ctx = new AudioContext();
      if (type === 'warning') {
        // Two soft beeps
        [600, 600].forEach((f, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sine';
          o.frequency.value = f;
          g.gain.setValueAtTime(0, ctx.currentTime + i * 0.35);
          g.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.35 + 0.05);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.35 + 0.3);
          o.start(ctx.currentTime + i * 0.35);
          o.stop(ctx.currentTime + i * 0.35 + 0.35);
        });
      } else {
        // Three ascending tones for session start
        [440, 550, 660].forEach((f, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'triangle';
          o.frequency.value = f;
          g.gain.setValueAtTime(0, ctx.currentTime + i * 0.2);
          g.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i * 0.2 + 0.05);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.2 + 0.4);
          o.start(ctx.currentTime + i * 0.2);
          o.stop(ctx.currentTime + i * 0.2 + 0.45);
        });
      }
    } catch(e) {}
  }

  function showAlarm(type, subject, time) {
    if (alarmsMuted) return;
    const overlay = document.getElementById('alarmOverlay');
    const tag = document.getElementById('alarmTag');
    const subjectEl = document.getElementById('alarmSubject');
    const timeEl = document.getElementById('alarmTime');

    popup.className = 'alarm-popup ' + type;
    tag.textContent = type === 'warning' ? '⚠ in 5 minutes' : '▶ starting now';
    subjectEl.textContent = subject;
    timeEl.textContent = time;

    popup.classList.add('show');
    overlay.classList.add('show');
    playAlarmSound(type);

    // Auto-dismiss after 10s
    clearTimeout(popup._dismissTimer);
    popup._dismissTimer = setTimeout(dismissAlarm, 10000);
  }

  function dismissAlarm() {
    document.getElementById('alarmPopup').classList.remove('show');
    document.getElementById('alarmOverlay').classList.remove('show');
  }

  function checkAlarms() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    const nowMins = h < 11 ? (h + 24) * 60 + m : h * 60 + m;

    schedule.forEach((s, i) => {
      const sMins = timeToMins(s.time);

      // 5-min warning
      const warnKey = 'warn-' + i;
      if (!alarmFired[warnKey] && nowMins >= sMins - 5 && nowMins < sMins - 4) {
        alarmFired[warnKey] = true;
        showAlarm('warning', s.subject, s.time);
      }

      // Session start
      const startKey = 'start-' + i;
      if (!alarmFired[startKey] && nowMins >= sMins && nowMins < sMins + 1) {
        alarmFired[startKey] = true;
        showAlarm('start', s.subject, s.time);
      }
    });
  }

  // Check every 30s
  setInterval(checkAlarms, 30000);

  // ---- PAGE SWITCHING ----
  function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.getElementById('tab-' + page).classList.add('active');
    if (page === 'pomodoro') buildPomoDots();
  }

  // ---- SCHEDULE TOGGLE ----
  let tapeVisible = true;
  function toggleTape() {
    tapeVisible = !tapeVisible;
    const tape = document.getElementById('schedTape');
    const btn = document.getElementById('tapeToggle');
    if (tapeVisible) {
      tape.classList.remove('tape-hidden');
      btn.classList.remove('hidden-state');
      btn.textContent = '\u203a';
      btn.style.right = '108px';
    } else {
      tape.classList.add('tape-hidden');
      btn.classList.add('hidden-state');
      btn.textContent = '\u2039';
      btn.style.right = '0px';
    }
  }

  // ---- POMODORO ----
  let pomoRunning = false;
  let pomoRafId = null;
  let pomoPhase = 'work';
  let pomoCurrentRound = 1;
  let pomoRemaining = 0;
  let pomoTotal = 0;
  let pomoStartTime = null;
  let pomoRemainingAtStart = 0;
  const pomoCircumference = 2 * Math.PI * 120;

  const pomoRingEl = document.getElementById('pomoRingProgress');
  pomoRingEl.style.strokeDasharray = pomoCircumference;
  pomoRingEl.style.strokeDashoffset = pomoCircumference;

  function buildPomoDots() {
    const rounds = parseInt(document.getElementById('pomoRounds').value) || 4;
    const container = document.getElementById('pomoDots');
    container.innerHTML = '';
    for (let i = 0; i < rounds; i++) {
      const d = document.createElement('div');
      d.className = 'pomo-dot';
      d.id = 'pomo-dot-' + i;
      container.appendChild(d);
    }
    updatePomoDots();
  }

  function updatePomoDots() {
    const rounds = parseInt(document.getElementById('pomoRounds').value) || 4;
    for (let i = 0; i < rounds; i++) {
      const d = document.getElementById('pomo-dot-' + i);
      if (!d) continue;
      d.classList.remove('filled', 'break-filled');
      if (i < pomoCurrentRound - 1) d.classList.add('filled');
      else if (i === pomoCurrentRound - 1 && pomoPhase === 'break') d.classList.add('break-filled');
    }
  }

  function pomoReset() {
    cancelAnimationFrame(pomoRafId);
    pomoRunning = false;
    pomoPhase = 'work';
    pomoCurrentRound = 1;
    const workMins = parseInt(document.getElementById('pomoWorkMins').value) || 25;
    pomoTotal = workMins * 60;
    pomoRemaining = pomoTotal;
    document.getElementById('pomoStartBtn').textContent = 'start';
    document.getElementById('pomoStartBtn').classList.remove('running');
    document.getElementById('pomoTimeDisplay').className = 'pomo-time work-phase';
    document.getElementById('pomoPhaseLabel').className = 'pomo-phase-label';
    document.getElementById('pomoPhaseLabel').textContent = 'work';
    updatePomoDisplay();
    setPomoRing(1);
    buildPomoDots();
  }

  function pomoToggle() {
    if (!pomoTotal) { pomoReset(); return; }
    if (pomoRunning) {
      cancelAnimationFrame(pomoRafId);
      pomoRunning = false;
      pomoRemaining = getPomoRemainingNow();
      document.getElementById('pomoStartBtn').textContent = 'resume';
      document.getElementById('pomoStartBtn').classList.remove('running');
    } else {
      if (pomoRemaining <= 0) { pomoReset(); return; }
      pomoRunning = true;
      pomoStartTime = Date.now();
      pomoRemainingAtStart = pomoRemaining;
      document.getElementById('pomoStartBtn').textContent = 'pause';
      document.getElementById('pomoStartBtn').classList.add('running');
      pomoRafId = requestAnimationFrame(pomoTick);
    }
  }

  function getPomoRemainingNow() {
    const elapsed = Math.floor((Date.now() - pomoStartTime) / 1000);
    return Math.max(0, pomoRemainingAtStart - elapsed);
  }

  function pomoTick() {
    const rem = getPomoRemainingNow();
    pomoRemaining = rem;
    updatePomoDisplay();
    setPomoRing(pomoRemaining / pomoTotal);

    if (rem <= 0) {
      pomoRunning = false;
      document.getElementById('pomoStartBtn').classList.remove('running');
      playAlarmSound('start');
      const rounds = parseInt(document.getElementById('pomoRounds').value) || 4;
      const breakMins = parseInt(document.getElementById('pomoBreakMins').value) || 5;
      const workMins = parseInt(document.getElementById('pomoWorkMins').value) || 25;

      if (pomoPhase === 'work') {
        logSession('Pomodoro #' + pomoCurrentRound, workMins * 60);
        if (pomoCurrentRound >= rounds) {
          document.getElementById('pomoTimeDisplay').className = 'pomo-time done pulsing';
          document.getElementById('pomoPhaseLabel').textContent = 'done!';
          document.getElementById('pomoStartBtn').textContent = 'restart';
          updatePomoDots();
          return;
        }
        pomoPhase = 'break';
        pomoTotal = breakMins * 60;
        pomoRemaining = pomoTotal;
        document.getElementById('pomoPhaseLabel').className = 'pomo-phase-label break-phase';
        document.getElementById('pomoPhaseLabel').textContent = 'break';
        document.getElementById('pomoTimeDisplay').className = 'pomo-time break-phase';
      } else {
        pomoCurrentRound++;
        pomoPhase = 'work';
        pomoTotal = workMins * 60;
        pomoRemaining = pomoTotal;
        document.getElementById('pomoPhaseLabel').className = 'pomo-phase-label';
        document.getElementById('pomoPhaseLabel').textContent = 'work';
        document.getElementById('pomoTimeDisplay').className = 'pomo-time work-phase';
      }
      updatePomoDisplay();
      setPomoRing(1);
      updatePomoDots();
      pomoRunning = true;
      pomoStartTime = Date.now();
      pomoRemainingAtStart = pomoRemaining;
      document.getElementById('pomoStartBtn').textContent = 'pause';
      document.getElementById('pomoStartBtn').classList.add('running');
      pomoRafId = requestAnimationFrame(pomoTick);
      return;
    }
    pomoRafId = requestAnimationFrame(pomoTick);
  }

  function updatePomoDisplay() {
    const rounds = parseInt(document.getElementById('pomoRounds').value) || 4;
    const m = Math.floor(pomoRemaining / 60).toString().padStart(2, '0');
    const s = (pomoRemaining % 60).toString().padStart(2, '0');
    document.getElementById('pomoTimeDisplay').textContent = m + ':' + s;
    document.getElementById('pomoRoundLabel').textContent = 'round ' + pomoCurrentRound + ' / ' + rounds;
  }

  function setPomoRing(fraction) {
    pomoRingEl.style.strokeDashoffset = pomoCircumference * (1 - fraction);
  }

  function pomoSkip() {
    cancelAnimationFrame(pomoRafId);
    pomoRunning = false;
    const rounds = parseInt(document.getElementById('pomoRounds').value) || 4;
    const breakMins = parseInt(document.getElementById('pomoBreakMins').value) || 5;
    const workMins = parseInt(document.getElementById('pomoWorkMins').value) || 25;

    if (pomoPhase === 'work') {
      const secsStudied = pomoTotal - pomoRemaining;
      logSession('Pomodoro #' + pomoCurrentRound, secsStudied);
      if (pomoCurrentRound >= rounds) {
        document.getElementById('pomoTimeDisplay').className = 'pomo-time done pulsing';
        document.getElementById('pomoPhaseLabel').textContent = 'done!';
        document.getElementById('pomoStartBtn').textContent = 'restart';
        document.getElementById('pomoStartBtn').classList.remove('running');
        updatePomoDots();
        return;
      }
      pomoPhase = 'break';
      pomoTotal = breakMins * 60;
      pomoRemaining = pomoTotal;
      document.getElementById('pomoPhaseLabel').className = 'pomo-phase-label break-phase';
      document.getElementById('pomoPhaseLabel').textContent = 'break';
      document.getElementById('pomoTimeDisplay').className = 'pomo-time break-phase';
    } else {
      pomoCurrentRound++;
      pomoPhase = 'work';
      pomoTotal = workMins * 60;
      pomoRemaining = pomoTotal;
      document.getElementById('pomoPhaseLabel').className = 'pomo-phase-label';
      document.getElementById('pomoPhaseLabel').textContent = 'work';
      document.getElementById('pomoTimeDisplay').className = 'pomo-time work-phase';
    }
    document.getElementById('pomoStartBtn').textContent = 'start';
    document.getElementById('pomoStartBtn').classList.remove('running');
    updatePomoDisplay();
    setPomoRing(1);
    updatePomoDots();
  }

  window.addEventListener('load', () => {
    setTimeout(() => { pomoReset(); buildPomoDots(); }, 150);
  });

  // ---- TO-DO ----
  let todos = JSON.parse(localStorage.getItem('timer-todos') || '[]');

  function saveTodos() {
    localStorage.setItem('timer-todos', JSON.stringify(todos));
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- FLOATING TASK WIDGET ----
  let floatVisible = false;

  function toggleFloatTasks() {
    floatVisible = !floatVisible;
    const widget = document.getElementById('floatTasks');
    const fab = document.getElementById('floatTasksFab');
    if (floatVisible) {
      widget.classList.remove('hidden');
      fab.classList.remove('visible');
      renderFloatTasks();
    } else {
      widget.classList.add('hidden');
      fab.classList.add('visible');
    }
  }

  function renderFloatTasks() {
    const list = document.getElementById('floatTaskList');
    if (!list) return;
    list.innerHTML = '';
    todos.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'float-task-item' + (t.done ? ' done' : '');
      item.innerHTML = `
        <div class="float-task-box"><div class="float-task-check"></div></div>
        <span class="float-task-text">${escapeHtml(t.text)}</span>
        <button class="float-task-del" onclick="floatDeleteTodo(${i})">×</button>
      `;
      item.querySelector('.float-task-box').addEventListener('click', () => floatToggleTodo(i));
      item.querySelector('.float-task-text').addEventListener('click', () => floatToggleTodo(i));
      list.appendChild(item);
    });
    const done = todos.filter(t => t.done).length;
    const countEl = document.getElementById('floatTaskCount');
    if (countEl) countEl.textContent = done + ' / ' + todos.length;
  }

  function floatAddTodo() {
    const input = document.getElementById('floatTaskInput');
    const text = input.value.trim();
    if (!text) return;
    todos.push({ text, done: false });
    input.value = '';
    saveTodos();
    renderFloatTasks();
  }

  function floatToggleTodo(i) {
    todos[i].done = !todos[i].done;
    saveTodos();
    renderFloatTasks();
  }

  function floatDeleteTodo(i) {
    todos.splice(i, 1);
    saveTodos();
    renderFloatTasks();
  }

  function floatClearDone() {
    todos = todos.filter(t => !t.done);
    saveTodos();
    renderFloatTasks();
  }


  // ---- STOPWATCH ----
  let swRunning = false;
  let swElapsed = 0;
  let swStartTime = null;
  let swRafId = null;
  let swLaps = [];
  let swLapStart = 0;
  const swCircumference = 2 * Math.PI * 130;

  const swRing = document.getElementById('swRingProgress');
  swRing.style.strokeDasharray = swCircumference;
  swRing.style.strokeDashoffset = 0;

  function swToggle() {
    if (swRunning) {
      swElapsed += Date.now() - swStartTime;
      swRunning = false;
      cancelAnimationFrame(swRafId);
      document.getElementById('swStartBtn').textContent = 'resume';
      document.getElementById('swStartBtn').classList.remove('running');
    } else {
      swStartTime = Date.now();
      swRunning = true;
      document.getElementById('swStartBtn').textContent = 'pause';
      document.getElementById('swStartBtn').classList.add('running');
      document.getElementById('swLapBtn').disabled = false;
      swRafId = requestAnimationFrame(swTick);
    }
  }

  function swTick() {
    const total = swElapsed + (Date.now() - swStartTime);
    swUpdateDisplay(total);
    // ring spins every 60s
    const frac = (total % 60000) / 60000;
    swRing.style.strokeDashoffset = swCircumference * (1 - frac);
    swRafId = requestAnimationFrame(swTick);
  }

  function swUpdateDisplay(ms) {
    const total = Math.floor(ms / 100);
    const tenths = total % 10;
    const secs = Math.floor(total / 10) % 60;
    const mins = Math.floor(total / 600) % 60;
    const hrs = Math.floor(total / 36000);
    let str;
    if (hrs > 0) {
      str = hrs + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0') + '.' + tenths;
    } else {
      str = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0') + '.' + tenths;
    }
    document.getElementById('swDisplay').textContent = str;

    // current lap time
    const lapMs = swElapsed + (swRunning ? Date.now() - swStartTime : 0) - swLapStart;
    const lt = Math.floor(lapMs / 100);
    const ltenths = lt % 10;
    const lsecs = Math.floor(lt / 10) % 60;
    const lmins = Math.floor(lt / 600);
    document.getElementById('swLapLabel').textContent = 'lap ' + (swLaps.length + 1) + '  ' +
      String(lmins).padStart(2,'0') + ':' + String(lsecs).padStart(2,'0') + '.' + ltenths;
  }

  function swLap() {
    if (!swRunning) return;
    const total = swElapsed + (Date.now() - swStartTime);
    const lapMs = total - swLapStart;
    swLapStart = total;
    swLaps.unshift({ n: swLaps.length + 1, ms: lapMs });
    renderSwLaps();
  }

  function swReset() {
    cancelAnimationFrame(swRafId);
    swRunning = false;
    swElapsed = 0;
    swStartTime = null;
    swLaps = [];
    swLapStart = 0;
    document.getElementById('swDisplay').textContent = '00:00.0';
    document.getElementById('swLapLabel').textContent = '–';
    document.getElementById('swStartBtn').textContent = 'start';
    document.getElementById('swStartBtn').classList.remove('running');
    document.getElementById('swLapBtn').disabled = true;
    swRing.style.strokeDashoffset = 0;
    renderSwLaps();
  }

  function renderSwLaps() {
    const list = document.getElementById('swLapList');
    list.innerHTML = '';
    swLaps.forEach((lap, idx) => {
      const t = Math.floor(lap.ms / 100);
      const tenths = t % 10;
      const secs = Math.floor(t / 10) % 60;
      const mins = Math.floor(t / 600);
      const timeStr = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0') + '.' + tenths;

      // highlight fastest / slowest
      const allMs = swLaps.map(l => l.ms);
      const minMs = Math.min(...allMs);
      const maxMs = Math.max(...allMs);
      let color = '#555';
      if (swLaps.length > 1) {
        if (lap.ms === minMs) color = '#e8ff47';
        else if (lap.ms === maxMs) color = '#ff5f5f';
      }

      const el = document.createElement('div');
      el.style.cssText = 'display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1a1a1a;animation:fadeIn 0.2s ease;';
      el.innerHTML = `
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:#444;letter-spacing:1px;">lap ${lap.n}</span>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:${color};letter-spacing:1px;">${timeStr}</span>
      `;
      list.appendChild(el);
    });
  }


</script>



<div class="alarm-overlay" id="alarmOverlay" onclick="dismissAlarm()"></div>
<div class="alarm-popup" id="alarmPopup">
  <div class="alarm-tag" id="alarmTag">starting now</div>
  <div class="alarm-subject" id="alarmSubject">Quants</div>
  <div class="alarm-time" id="alarmTime">11:30</div>
  <button class="alarm-dismiss" onclick="dismissAlarm()">dismiss</button>
</div>

<!-- Total Hours Panel (left) -->
<div class="totals-panel" id="totalsPanel">
  <div class="totals-title">today</div>
  <div class="totals-big" id="totalHrsDisplay">0.0</div>
  <div class="totals-unit">hours</div>
  <div class="totals-divider"></div>
  <div class="totals-sessions" id="totalSessionsDisplay">0</div>
  <div class="totals-sessions-label">sessions</div>
  <div class="totals-log" id="totalsLog"></div>
  <div class="totals-divider"></div>
  <button class="totals-reset" id="muteBtn" onclick="toggleMute()">mute off</button>
  <button class="totals-reset" onclick="resetTotals()">clear</button>
</div>

<!-- Measuring tape schedule -->
<div class="tape" id="schedTape">
  <div class="tape-title">schedule</div>
  <div class="tape-inner" id="tapeInner">
    <div class="tape-track"></div>
    <div class="tape-now-line" id="tapeNowLine"></div>
  </div>
</div>


<!-- ===== FLOATING TASK WIDGET ===== -->
<div class="float-tasks hidden" id="floatTasks">
  <div class="float-tasks-header">
    <span class="float-tasks-title">tasks</span>
    <span class="float-tasks-count" id="floatTaskCount">0 / 0</span>
    <button class="float-tasks-close" onclick="toggleFloatTasks()">×</button>
  </div>
  <div class="float-tasks-input-row">
    <input class="float-tasks-input" id="floatTaskInput" type="text" placeholder="add a task..." maxlength="80"
      onkeydown="if(event.key==='Enter') floatAddTodo()"/>
    <button class="float-tasks-add" onclick="floatAddTodo()">+</button>
  </div>
  <div class="float-tasks-list" id="floatTaskList"></div>
  <div class="float-tasks-footer">
    <button onclick="floatClearDone()">clear done</button>
    <button onclick="toggleFloatTasks()">close</button>
  </div>
</div>
<button class="float-tasks-fab visible" id="floatTasksFab" onclick="toggleFloatTasks()">tasks</button>

</body>
</html>
